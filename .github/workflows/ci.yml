name: Build and Test

on:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore StudyFlowPro.sln

      - name: Build solution
        run: dotnet build StudyFlowPro.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test StudyFlowPro.sln --configuration Release --no-build --verbosity normal
